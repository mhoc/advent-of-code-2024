name: Build
on: [push, pull_request]
jobs:
  Build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Go ${{ matrix.go-version }}
        uses: actions/setup-go@v5
        with:
          go-version: 1.23.x
      - name: Display Go version
        run: go version
      - name: Build
        run: go build 
      - name: Test 
        run: go test ./...